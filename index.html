<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Arrowvania</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Top bar: Health (left) -->
  <header class="hud hud-top">
    <div class="hud-inner">
      <span class="hud-group hud-health">
        <span class="hud-label">Health</span>
        <span id="health-value" class="hud-value">99</span>
      </span>
    </div>
  </header>

  <!-- Stage holds the game canvas, the minimap is drawn on the canvas itself -->
  <main class="stage">
    <div class="play-area">
      <canvas id="game" tabindex="0"></canvas>
      <!-- First-load screen, same design as Recurve / Astro Siege. game.js hides it
           once the images and sounds have decoded (2s minimum so it doesn't flash). -->
      <div id="loading-overlay" class="loading-overlay">
        <svg class="loading-gear" viewBox="0 0 100 100" width="72" height="72" aria-hidden="true">
          <g class="gear-body">
            <circle cx="50" cy="50" r="27"/>
            <rect x="43" y="6" width="14" height="20" rx="4"/>
            <rect x="43" y="6" width="14" height="20" rx="4" transform="rotate(45 50 50)"/>
            <rect x="43" y="6" width="14" height="20" rx="4" transform="rotate(90 50 50)"/>
            <rect x="43" y="6" width="14" height="20" rx="4" transform="rotate(135 50 50)"/>
            <rect x="43" y="6" width="14" height="20" rx="4" transform="rotate(180 50 50)"/>
            <rect x="43" y="6" width="14" height="20" rx="4" transform="rotate(225 50 50)"/>
            <rect x="43" y="6" width="14" height="20" rx="4" transform="rotate(270 50 50)"/>
            <rect x="43" y="6" width="14" height="20" rx="4" transform="rotate(315 50 50)"/>
          </g>
          <circle class="gear-hub" cx="50" cy="50" r="12"/>
        </svg>
        <div class="loading-text">LOADING</div>
      </div>
    </div>
  </main>

  <!-- Bottom bar: control hints (left) and sound controls (right) -->
  <footer class="hud hud-bottom">
    <div class="hud-inner">
      <span class="hud-controls">
        <span class="key-hint"><span class="key-cap">A</span><span class="key-cap">D</span><span class="kh-word">Move</span></span>
        <span class="key-hint"><span class="key-cap">Space</span><span class="kh-word">Jump</span></span>
        <span class="key-hint"><svg class="key-mouse" viewBox="0 0 22 30" role="img" aria-label="Left click"><path d="M11 1 L11 13 L1 13 L1 11 A10 10 0 0 1 11 1 Z" fill="currentColor"/><rect x="1" y="1" width="20" height="28" rx="10" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M11 1 V13 M1 13 H21" fill="none" stroke="currentColor" stroke-width="1.6"/></svg><span class="kh-word">Aim / Shoot</span></span>
        <span class="key-hint"><span class="key-cap">Esc</span><span class="kh-word">Pause / Controls</span></span>
      </span>
      <span class="hud-group hud-sound-group">
        <span class="hud-sound">
          <span class="hud-label">Music</span>
          <button id="music-mute-btn" class="sound-btn" type="button" title="Mute / unmute music">&#128266;</button>
          <input id="music-slider" class="volume-slider" type="range" min="0" max="100" value="50" title="Music volume">
        </span>
        <span class="hud-sound">
          <span class="hud-label">SFX</span>
          <button id="sfx-mute-btn" class="sound-btn" type="button" title="Mute / unmute sound effects">&#128266;</button>
          <input id="sfx-slider" class="volume-slider" type="range" min="0" max="100" value="50" title="Sound-effect volume">
        </span>
      </span>
    </div>
  </footer>

  <script src="assets.js"></script>
  <script src="assets_knights.js"></script>
  <script src="assets_trolls.js"></script>
  <script src="assets_skeletons.js"></script>
  <script src="assets_necromancers.js"></script>
  <script src="assets_orcs.js"></script>
  <script src="assets_elves.js"></script>
  <script src="assets_warriors.js"></script>
  <script src="assets_pirates.js"></script>
  <script src="logic.js"></script>
  <script src="game.js"></script>
</body>
</html>
