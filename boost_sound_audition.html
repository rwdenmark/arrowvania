<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Speed Booster sound - audition</title>
<style>
  :root{ --bg:#14171c; --panel:#1c2129; --edge:#2b3340; --text:#e8ecf0; --muted:#8a94a2; --accent:#60e0d0; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text); font-family:ui-monospace,Menlo,Consolas,monospace; padding:32px 20px; }
  h1{ font-size:20px; margin:0 0 4px; }
  p.sub{ color:var(--muted); margin:0 0 24px; font-size:13px; max-width:660px; line-height:1.5; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; max-width:900px; }
  .card{ background:var(--panel); border:1px solid var(--edge); border-radius:10px; padding:16px; }
  .card h2{ font-size:15px; margin:0 0 4px; color:var(--accent); }
  .card p{ font-size:12px; color:var(--muted); margin:0 0 14px; line-height:1.4; min-height:34px; }
  button{ width:100%; padding:12px; font-family:inherit; font-size:14px; cursor:pointer;
          background:transparent; color:var(--accent); border:1px solid var(--accent); border-radius:6px; }
  button:hover{ background:rgba(96,224,208,0.12); }
</style>
</head>
<body>
  <h1>Speed Booster sound &mdash; pick one</h1>
  <p class="sub">Six sustained "while boosting" sounds. Each plays ~1.4s here but in game it loops the whole time you're boosting (and the footstep grass sound is muted). Tell me the number and I'll wire it in with clean start/stop like the charge hum.</p>
  <div class="grid" id="grid"></div>

<script>
let AC=null;
function ctx(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; }
function noise(ac,dur){ const len=Math.max(1,Math.floor(ac.sampleRate*dur)); const b=ac.createBuffer(1,len,ac.sampleRate); const d=b.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1; return b; }
const bus=()=>{ const ac=ctx(); const g=ac.createGain(); g.gain.value=0.8; g.connect(ac.destination); return g; };
const DUR=1.4;
function env(ac,g,t,peak){ g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(peak,t+0.05); g.gain.setValueAtTime(peak,t+DUR-0.2); g.gain.exponentialRampToValueAtTime(0.0001,t+DUR); }

const sounds = [
  // 1 energy hum - bright rising saw over a sub, filter opening
  ()=>{ const ac=ctx(),t=ac.currentTime,o=bus();
    const sub=ac.createOscillator(); sub.type='sine'; sub.frequency.value=60; const sgn=ac.createGain(); sgn.gain.value=0.3; sub.connect(sgn).connect(o); sub.start(t); sub.stop(t+DUR);
    const s=ac.createOscillator(); s.type='sawtooth'; s.frequency.setValueAtTime(180,t); s.frequency.linearRampToValueAtTime(320,t+0.4);
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=4; lp.frequency.setValueAtTime(700,t); lp.frequency.exponentialRampToValueAtTime(2600,t+0.6);
    const g=ac.createGain(); env(ac,g,t,0.3); s.connect(lp).connect(g).connect(o); s.start(t); s.stop(t+DUR); },

  // 2 whoosh - swept bandpass noise, airy
  ()=>{ const ac=ctx(),t=ac.currentTime,o=bus();
    const n=ac.createBufferSource(); n.buffer=noise(ac,DUR+0.1); n.loop=true;
    const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=3; bp.frequency.setValueAtTime(500,t); bp.frequency.exponentialRampToValueAtTime(1800,t+0.5);
    const g=ac.createGain(); env(ac,g,t,0.5); n.connect(bp).connect(g).connect(o); n.start(t); n.stop(t+DUR);
    const lo=ac.createOscillator(); lo.type='sine'; lo.frequency.value=80; const lg=ac.createGain(); lg.gain.value=0.22; lo.connect(lg).connect(o); lo.start(t); lo.stop(t+DUR); },

  // 3 electric zap into a buzzy ring-mod sustain
  ()=>{ const ac=ctx(),t=ac.currentTime,o=bus();
    const z=ac.createOscillator(); z.type='sawtooth'; z.frequency.setValueAtTime(400,t); z.frequency.exponentialRampToValueAtTime(1200,t+0.08); const zg=ac.createGain(); zg.gain.setValueAtTime(0.3,t); zg.gain.exponentialRampToValueAtTime(0.001,t+0.12); z.connect(zg).connect(o); z.start(t); z.stop(t+0.14);
    const car=ac.createOscillator(); car.type='sawtooth'; car.frequency.value=260; const mod=ac.createOscillator(); mod.type='sine'; mod.frequency.value=64; const ring=ac.createGain(); ring.gain.value=0; mod.connect(ring.gain); car.connect(ring);
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1800; const g=ac.createGain(); env(ac,g,t,0.3); ring.connect(lp).connect(g).connect(o); car.start(t); mod.start(t); car.stop(t+DUR); mod.stop(t+DUR); },

  // 4 jet afterburner - lowpassed roar with tremolo + sub
  ()=>{ const ac=ctx(),t=ac.currentTime,o=bus();
    const n=ac.createBufferSource(); n.buffer=noise(ac,DUR+0.1); n.loop=true;
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=950; lp.Q.value=2;
    const g=ac.createGain(); env(ac,g,t,0.4);
    const trem=ac.createOscillator(); trem.type='sine'; trem.frequency.value=22; const td=ac.createGain(); td.gain.value=0.12; trem.connect(td).connect(g.gain); trem.start(t); trem.stop(t+DUR);
    n.connect(lp).connect(g).connect(o); n.start(t); n.stop(t+DUR);
    const sub=ac.createOscillator(); sub.type='sine'; sub.frequency.value=55; const sg=ac.createGain(); sg.gain.value=0.3; sub.connect(sg).connect(o); sub.start(t); sub.stop(t+DUR); },

  // 5 warp shimmer - detuned sines with slow tremolo
  ()=>{ const ac=ctx(),t=ac.currentTime,o=bus();
    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2000; const g=ac.createGain(); env(ac,g,t,0.28); lp.connect(g).connect(o);
    [220,221.8,330,441].forEach(f=>{ const s=ac.createOscillator(); s.type='sine'; s.frequency.value=f; const sg=ac.createGain(); sg.gain.value=0.25; s.connect(sg).connect(lp); s.start(t); s.stop(t+DUR); });
    const trem=ac.createOscillator(); trem.type='sine'; trem.frequency.value=6; const td=ac.createGain(); td.gain.value=0.12; trem.connect(td).connect(g.gain); trem.start(t); trem.stop(t+DUR); },

  // 6 pulsing charge - a bright tone gated by a fast LFO
  ()=>{ const ac=ctx(),t=ac.currentTime,o=bus();
    const s=ac.createOscillator(); s.type='sawtooth'; s.frequency.value=240; const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2200;
    const g=ac.createGain(); g.gain.value=0.0; const base=ac.createGain(); env(ac,base,t,0.34); s.connect(lp).connect(g).connect(base).connect(o);
    const lfo=ac.createOscillator(); lfo.type='square'; lfo.frequency.value=13; const ld=ac.createGain(); ld.gain.value=0.5; g.gain.value=0.5; lfo.connect(ld).connect(g.gain); lfo.start(t); lfo.stop(t+DUR);
    s.start(t); s.stop(t+DUR);
    const sub=ac.createOscillator(); sub.type='sine'; sub.frequency.value=70; const sg=ac.createGain(); sg.gain.value=0.22; sub.connect(sg).connect(o); sub.start(t); sub.stop(t+DUR); },
];
const names = ['1 - Energy hum','2 - Whoosh','3 - Electric zap + buzz','4 - Jet afterburner','5 - Warp shimmer','6 - Pulsing charge'];
const descs = ['Bright rising drone over a sub. Clean and energetic.','Swept airy noise whoosh with a low body.','A zap that settles into a gritty electric buzz.','Lowpassed roar with a throbbing tremolo and deep sub.','Detuned shimmering sines with a slow wobble.','A bright tone chopped into a rhythmic pulse.'];
const grid=document.getElementById('grid');
sounds.forEach((fn,i)=>{ const c=document.createElement('div'); c.className='card';
  const h=document.createElement('h2'); h.textContent=names[i]; const p=document.createElement('p'); p.textContent=descs[i];
  const b=document.createElement('button'); b.textContent='Play'; b.addEventListener('click',()=>{ try{ fn(); }catch(e){ console.error(e); } });
  c.appendChild(h); c.appendChild(p); c.appendChild(b); grid.appendChild(c); });
</script>
</body>
</html>
