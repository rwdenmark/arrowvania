<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Warp shimmer - alternatives</title>
<style>
  :root{ --bg:#14171c; --panel:#1c2129; --edge:#2b3340; --text:#e8ecf0; --muted:#8a94a2; --accent:#60e0d0; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text); font-family:ui-monospace,Menlo,Consolas,monospace; padding:32px 20px; }
  h1{ font-size:20px; margin:0 0 4px; }
  p.sub{ color:var(--muted); margin:0 0 24px; font-size:13px; max-width:640px; line-height:1.5; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; max-width:900px; }
  .card{ background:var(--panel); border:1px solid var(--edge); border-radius:10px; padding:16px; }
  .card h2{ font-size:15px; margin:0 0 4px; color:var(--accent); }
  .card p{ font-size:12px; color:var(--muted); margin:0 0 14px; line-height:1.4; min-height:34px; }
  button{ width:100%; padding:12px; font-family:inherit; font-size:14px; cursor:pointer;
          background:transparent; color:var(--accent); border:1px solid var(--accent); border-radius:6px; }
  button:hover{ background:rgba(96,224,208,0.12); }
</style>
</head>
<body>
  <h1>Warp shimmer &mdash; alternatives</h1>
  <p class="sub">Six takes close to the warp shimmer: detuned sine clusters with a slow wobble. #1 is the original. Loops while boosting in game. Tell me the number.</p>
  <div class="grid" id="grid"></div>

<script>
let AC=null;
function ctx(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; }
const bus=()=>{ const ac=ctx(); const g=ac.createGain(); g.gain.value=0.8; g.connect(ac.destination); return g; };
const DUR=1.6;
function shimmer(o){
  const ac=ctx(),t=ac.currentTime,out=bus();
  const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=o.lp;
  const g=ac.createGain();
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(o.peak,t+0.08); g.gain.setValueAtTime(o.peak,t+DUR-0.25); g.gain.exponentialRampToValueAtTime(0.0001,t+DUR);
  lp.connect(g).connect(out);
  const vg = o.voiceGain != null ? o.voiceGain : 0.9/o.freqs.length;
  o.freqs.forEach((f,i)=>{ const s=ac.createOscillator(); s.type='sine'; s.frequency.value=f; if(o.detune) s.detune.value=(i%2?1:-1)*o.detune*(1+i*0.35);
    const sg=ac.createGain(); sg.gain.value=vg; s.connect(sg).connect(lp); s.start(t); s.stop(t+DUR); });
  const trem=ac.createOscillator(); trem.type='sine'; trem.frequency.value=o.tremRate; const td=ac.createGain(); td.gain.value=o.tremDepth; trem.connect(td).connect(g.gain); trem.start(t); trem.stop(t+DUR);
}
const variants = [
  { n:'1 - Original',            d:'The warp shimmer as-is: detuned sines, slow 6 Hz wobble.', o:{ freqs:[220,220,330,441], detune:14, lp:2000, tremRate:6,  tremDepth:0.12, peak:0.28 } },
  { n:'2 - Wide chorus',         d:'Heavier detuning for a thicker, beating shimmer.',         o:{ freqs:[220,220,330,441], detune:34, lp:2000, tremRate:6,  tremDepth:0.12, peak:0.28 } },
  { n:'3 - Brighter / higher',   d:'Chord up a step with an open filter. Airier.',             o:{ freqs:[330,330,440,660], detune:16, lp:3200, tremRate:6,  tremDepth:0.12, peak:0.24 } },
  { n:'4 - Faster wobble',       d:'Quicker tremolo for a more animated shimmer.',             o:{ freqs:[220,220,330,441], detune:16, lp:2200, tremRate:11, tremDepth:0.18, peak:0.28 } },
  { n:'5 - Darker / lower',      d:'Chord down a fifth, warmer filter. Deeper warp.',          o:{ freqs:[147,147,220,294], detune:14, lp:1400, tremRate:5,  tremDepth:0.12, peak:0.3  } },
  { n:'6 - Glassy top',          d:'Extra high partials for a sparkling, crystalline sheen.',  o:{ freqs:[220,220,330,660,880], detune:14, lp:3800, tremRate:8, tremDepth:0.1, peak:0.2, voiceGain:0.15 } },
];
const grid=document.getElementById('grid');
variants.forEach(v=>{ const c=document.createElement('div'); c.className='card';
  const h=document.createElement('h2'); h.textContent=v.n; const p=document.createElement('p'); p.textContent=v.d;
  const b=document.createElement('button'); b.textContent='Play'; b.addEventListener('click',()=>{ try{ shimmer(v.o); }catch(e){ console.error(e); } });
  c.appendChild(h); c.appendChild(p); c.appendChild(b); grid.appendChild(c); });
</script>
</body>
</html>
