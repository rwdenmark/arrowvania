<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Speed Booster look - audition</title>
<style>
  :root{ --bg:#14171c; --panel:#1c2129; --edge:#2b3340; --text:#e8ecf0; --muted:#8a94a2; --accent:#60e0d0; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text); font-family:ui-monospace,Menlo,Consolas,monospace; padding:28px 20px; }
  h1{ font-size:20px; margin:0 0 4px; }
  p.sub{ color:var(--muted); margin:0 0 20px; font-size:13px; max-width:720px; line-height:1.5; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; max-width:1000px; }
  .card{ background:var(--panel); border:1px solid var(--edge); border-radius:10px; padding:14px; }
  .card h3{ font-size:14px; margin:0 0 8px; color:var(--accent); }
  .card p{ font-size:12px; color:var(--muted); margin:8px 0 0; line-height:1.4; min-height:34px; }
  canvas{ background:linear-gradient(#0e1a26,#132430); border:1px solid var(--edge); border-radius:6px; display:block; width:100%; }
</style>
</head>
<body>
  <h1>Speed Booster &mdash; pick the look</h1>
  <p class="sub">Six prismatic rainbow glow + stream styles for the ranger while boosting. Each loops the run cycle. Tell me the number and I'll swap it into the game (the current in-game version is #1). I can tune colors, trail length, and intensity on whichever you pick.</p>
  <div class="grid" id="grid"></div>

<script src="assets.js"></script>
<script>
const img = new Image(); img.src = ASSETS.archer;
const RUN = ASSETS.ROWS.indexOf('RUN');
const FW=ASSETS.FRAME_W, FH=ASSETS.FRAME_H, AX=ASSETS.anchorX, AY=ASSETS.anchorY, SS=ASSETS.SPRITE_SCALE, NF=ASSETS.FRAMES;
const SC=0.42, DW=FW/SS*SC, DH=FH/SS*SC;

function archer(g, cx, footY, frame, o){
  o=o||{};
  g.save(); g.imageSmoothingEnabled=true; g.translate(cx, footY);
  if (o.flip) g.scale(-1,1);
  if (o.alpha!=null) g.globalAlpha=o.alpha;
  if (o.filter) g.filter=o.filter;
  if (o.shadow){ g.shadowColor=o.shadow; g.shadowBlur=o.blur||16; }
  g.drawImage(img, frame*FW, RUN*FH, FW, FH, -AX/SS*SC, -AY/SS*SC, DW, DH);
  g.restore();
}
function hue(h,l){ return 'hsl('+((h%360+360)%360).toFixed(0)+',100%,'+(l||60)+'%)'; }

// each effect: draw(g, s, t)  where s={x,frame,hist:[{x,frame}]}, t=seconds
const effects = [
  { name:'1 - Hue-cycle echoes', desc:'Fading afterimages, each shifted around the rainbow. (current in-game)',
    draw(g,s,t){ for(let i=0;i<s.hist.length;i++){ const e=s.hist[i]; archer(g, e.x, s.footY, e.frame, { alpha:(i/s.hist.length)*0.55, filter:'hue-rotate('+((t*360+i*36)%360)+'deg) saturate(4) brightness(1.4)'}); } archer(g, s.x, s.footY, s.frame, { shadow:hue(t*300), blur:14 }); } },

  { name:'2 - Rainbow aura + ribbon', desc:'Solid glowing aura with a wavy rainbow ribbon streaming behind.',
    draw(g,s,t){ g.save(); g.lineWidth=5; g.lineCap='round';
      for(let k=0;k<3;k++){ g.beginPath(); for(let d=0;d<=70;d+=6){ const x=s.x-10-d; const y=s.footY-38+Math.sin(d*0.18 - t*8 + k*1.6)*(7+k*3); if(d===0)g.moveTo(x,y); else g.lineTo(x,y);} g.strokeStyle=hue(t*260 - k*70,55); g.globalAlpha=0.7-k*0.18; g.stroke(); }
      g.restore(); archer(g, s.x, s.footY, s.frame, { shadow:hue(t*260), blur:22 }); } },

  { name:'3 - Prismatic outline + sparks', desc:'Rainbow rim-glow on the body with sparkle particles peeling off.',
    draw(g,s,t){ archer(g, s.x, s.footY, s.frame, { shadow:hue(t*320), blur:6 }); archer(g, s.x, s.footY, s.frame, { shadow:hue(t*320+180), blur:14, alpha:0.6 });
      for(const p of s.spark){ g.fillStyle=hue(p.h,70); g.globalAlpha=p.life; g.beginPath(); g.arc(p.x,p.y,p.r,0,7); g.fill(); } g.globalAlpha=1; } },

  { name:'4 - Chromatic split', desc:'RGB channels offset for a fast chromatic-aberration blur, rainbow tinted.',
    draw(g,s,t){ g.save(); g.globalCompositeOperation='lighter';
      const off=3+Math.sin(t*10)*1.5;
      archer(g, s.x-off, s.footY, s.frame, { filter:'brightness(0.001) drop-shadow(0 0 0 #f33)', alpha:0 });
      archer(g, s.x-off, s.footY, s.frame, { filter:'sepia(1) saturate(6) hue-rotate(-50deg)', alpha:0.9 });
      archer(g, s.x, s.footY, s.frame, { filter:'sepia(1) saturate(6) hue-rotate(70deg)', alpha:0.9 });
      archer(g, s.x+off, s.footY, s.frame, { filter:'sepia(1) saturate(6) hue-rotate(190deg)', alpha:0.9 });
      g.restore(); archer(g, s.x, s.footY, s.frame, { alpha:0.5 }); } },

  { name:'5 - Gradient body + speed lines', desc:'Moving rainbow wash over the body with horizontal speed streaks.',
    draw(g,s,t){ g.save(); g.globalAlpha=0.5; for(let i=0;i<7;i++){ const y=s.footY-14-i*10; g.strokeStyle=hue(t*240 - i*30,60); g.lineWidth=2; g.beginPath(); g.moveTo(s.x-20-((t*260+i*40)%80), y); g.lineTo(s.x-20-((t*260+i*40)%80)-24, y); g.stroke(); } g.restore();
      archer(g, s.x, s.footY, s.frame, {});
      // rainbow wash over the sprite pixels
      g.save(); g.translate(s.x, s.footY); g.globalCompositeOperation='source-atop'; g.globalAlpha=0.55;
      const grd=g.createLinearGradient(-DW/2, -DH+ (t*90)%DH, DW/2, (t*90)%DH); for(let i=0;i<=6;i++) grd.addColorStop(i/6, hue(t*200 + i*60));
      // clip to sprite by redrawing as mask
      g.restore(); archer(g, s.x, s.footY, s.frame, { filter:'saturate(3) hue-rotate('+((t*160)%360)+'deg) brightness(1.2)', alpha:0.5 }); } },

  { name:'6 - Bloom silhouette echoes', desc:'White-hot core with heavy rainbow bloom and bright silhouette echoes.',
    draw(g,s,t){ g.save(); g.globalCompositeOperation='lighter';
      for(let i=0;i<s.hist.length;i++){ const e=s.hist[i]; archer(g, e.x, s.footY, e.frame, { alpha:(i/s.hist.length)*0.4, filter:'brightness(0) drop-shadow(0 0 6px '+hue(t*300+i*30,60)+')' }); }
      g.restore();
      archer(g, s.x, s.footY, s.frame, { shadow:hue(t*300), blur:26 });
      archer(g, s.x, s.footY, s.frame, { filter:'brightness(2.2) saturate(0)', alpha:0.85 }); } },
];

const grid=document.getElementById('grid');
const cards = effects.map(fx=>{
  const c=document.createElement('div'); c.className='card';
  const h=document.createElement('h3'); h.textContent=fx.name;
  const cv=document.createElement('canvas'); cv.width=280; cv.height=150;
  const p=document.createElement('p'); p.textContent=fx.desc;
  c.appendChild(h); c.appendChild(cv); c.appendChild(p); grid.appendChild(c);
  return { fx, g:cv.getContext('2d'), s:{ x:60, footY:120, frame:0, ftime:0, hist:[], spark:[] } };
});

let last=0;
function frame(now){
  const t=now*0.001, dt=Math.min(0.05,(now-last)/1000); last=now;
  for(const card of cards){
    const s=card.s, g=card.g;
    // advance run
    s.x += 130*dt; if (s.x>320){ s.x=-40; s.hist.length=0; s.spark.length=0; }
    s.ftime += dt; if (s.ftime>0.06){ s.ftime=0; s.frame=(s.frame+1)%NF; }
    s.hist.push({x:s.x, frame:s.frame}); if (s.hist.length>9) s.hist.shift();
    // sparks for effect 3
    if (Math.random()<0.6) s.spark.push({ x:s.x-6+Math.random()*12, y:s.footY-30-Math.random()*40, r:1+Math.random()*2, h:t*300+Math.random()*120, life:1 });
    for(const p of s.spark){ p.x-=40*dt; p.y-=10*dt; p.life-=dt*2; } s.spark=s.spark.filter(p=>p.life>0);
    g.clearRect(0,0,280,150);
    if (img.complete) card.fx.draw(g, s, t);
  }
  requestAnimationFrame(frame);
}
img.onload = ()=>requestAnimationFrame(frame);
if (img.complete) requestAnimationFrame(frame);
</script>
</body>
</html>
